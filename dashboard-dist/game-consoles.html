<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Console Manager — PS VIBE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { indigo: { 600: '#4f46e5', 700: '#4338ca', 500: '#6366f1' } }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .badge-ssd { background: #dbeafe; color: #1e40af; }
    .badge-console { background: #d1fae5; color: #065f46; }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen">
  <div class="max-w-7xl mx-auto px-4 py-6">
    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold">🎮 Game Console Manager</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Manage which games are installed on which consoles / backed up on which SSDs</p>
      </div>
      <div class="flex gap-3 mt-2 sm:mt-0">
        <a href="/" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition text-sm">
          ← Back to Dashboard
        </a>
        <button onclick="refreshList()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition text-sm">
          🔄 Refresh
        </button>
      </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap gap-3 mb-4">
      <input id="searchInput" placeholder="Search games..." 
        class="w-full md:w-96 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white" />
      <select id="genreFilter" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white">
        <option value="">All Genres</option>
        <option value="Action">Action</option>
        <option value="Adventure">Adventure</option>
        <option value="RPG">RPG</option>
        <option value="Sports">Sports</option>
        <option value="Racing">Racing</option>
        <option value="Fighting">Fighting</option>
        <option value="Horror">Horror</option>
        <option value="Puzzle">Puzzle</option>
        <option value="Strategy">Strategy</option>
        <option value="Shooter">Shooter</option>
      </select>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden flex justify-center py-12">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
    </div>

    <!-- Table -->
    <div id="tableContainer" class="bg-white dark:bg-gray-800 rounded-lg shadow overflow-hidden">
      <div class="overflow-x-auto">
        <table id="gamesTable" class="w-full">
          <thead class="bg-gray-50 dark:bg-gray-700">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Game Title</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Genre</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Status</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Installed On</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">SSD Backup</th>
              <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="gamesBody" class="divide-y divide-gray-200 dark:divide-gray-700"></tbody>
        </table>
      </div>
    </div>

    <p id="emptyMsg" class="hidden text-center py-12 text-gray-500">No games found.</p>
  </div>

  <!-- Manage Modal -->
  <div id="manageModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 fade-in" onclick="if(event.target===this)closeModal()">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div class="flex justify-between items-center mb-4">
        <h2 id="modalTitle" class="text-xl font-bold text-gray-900 dark:text-white">Manage: <span id="modalGameTitle"></span></h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-2xl">&times;</button>
      </div>

      <!-- Current Installations -->
      <div class="mb-6">
        <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2 uppercase tracking-wider">📺 Consoles</h3>
        <div id="currentConsoles" class="flex flex-wrap gap-2 mb-4"></div>
        <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2 uppercase tracking-wider">💾 SSD Backups</h3>
        <div id="currentSsds" class="flex flex-wrap gap-2"></div>
      </div>

      <hr class="my-4 border-gray-200 dark:border-gray-700">

      <!-- Add Console -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Install on Console</label>
        <div class="flex gap-2">
          <select id="consoleSelect" class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white text-sm">
            <option value="">— Select console —</option>
          </select>
          <button onclick="installOnConsole()" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm transition">Install</button>
        </div>
      </div>

      <!-- Add SSD -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Backup on SSD</label>
        <div class="flex gap-2">
          <select id="ssdSelect" class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white text-sm">
            <option value="">— Select SSD —</option>
          </select>
          <button onclick="installOnSsd()" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg text-sm transition">Backup</button>
        </div>
      </div>

      <div class="flex justify-end gap-3">
        <button onclick="closeModal()" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition text-sm">Close</button>
      </div>
    </div>
  </div>

  <script>
    let games = [];
    let currentGame = null;
    let targetConsoles = [];
    let targetSsds = [];
    let debounceTimer = null;

    // Fetch games
    async function fetchGames() {
      const search = document.getElementById('searchInput').value;
      const genre = document.getElementById('genreFilter').value;
      const params = new URLSearchParams();
      if (search) params.set('search', search);
      if (genre) params.set('genre', genre);
      params.set('limit', '500');

      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('tableContainer').classList.add('hidden');

      try {
        const res = await fetch('/api/dashboard/games?' + params.toString(), { credentials: 'include' });
        const json = await res.json();
        if (json.success) {
          games = json.data || [];
          renderGames();
        } else {
          showError(json.error || 'Failed to load games');
        }
      } catch (err) {
        showError(err.message);
      } finally {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('tableContainer').classList.remove('hidden');
      }
    }

    // Fetch install targets
    async function fetchTargets() {
      try {
        const res = await fetch('/api/dashboard/games/install-targets', { credentials: 'include' });
        const json = await res.json();
        if (json.success) {
          targetConsoles = json.data.consoles || [];
          targetSsds = json.data.ssds || [];
          populateTargetSelects();
        }
      } catch (err) {
        console.error('Failed to load targets:', err);
      }
    }

    function populateTargetSelects() {
      const consoleSel = document.getElementById('consoleSelect');
      const ssdSel = document.getElementById('ssdSelect');
      consoleSel.innerHTML = '<option value="">— Select console —</option>';
      ssdSel.innerHTML = '<option value="">— Select SSD —</option>';

      targetConsoles.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        consoleSel.appendChild(opt);
      });
      targetSsds.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.name;
        ssdSel.appendChild(opt);
      });
    }

    function renderGames() {
      const tbody = document.getElementById('gamesBody');
      const emptyMsg = document.getElementById('emptyMsg');

      if (!games.length) {
        tbody.innerHTML = '';
        emptyMsg.classList.remove('hidden');
        return;
      }
      emptyMsg.classList.add('hidden');

      tbody.innerHTML = games.map(g => {
        const consoles = (g.consoles || []).map(c =>
          `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium badge-console">${c.console_id}</span>`
        ).join(' ') || '<span class="text-gray-400 text-xs">—</span>';

        const ssds = (g.ssds || []).map(s =>
          `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium badge-ssd">${s.console_id}</span>`
        ).join(' ') || '<span class="text-gray-400 text-xs">—</span>';

        const statusClass = {
          'available': 'bg-green-100 text-green-800',
          'damaged': 'bg-red-100 text-red-800',
          'lost': 'bg-gray-100 text-gray-800',
          'in use': 'bg-blue-100 text-blue-800',
        }[(g.final_status || '').toLowerCase()] || 'bg-gray-100 text-gray-800';

        return `<tr class="hover:bg-gray-50 dark:hover:bg-gray-750">
          <td class="px-4 py-3 text-sm font-medium text-gray-900 dark:text-white">${esc(g.game_title)}</td>
          <td class="px-4 py-3 text-sm text-gray-700 dark:text-gray-300">${esc(g.genre || '-')}</td>
          <td class="px-4 py-3 text-sm">
            <span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium capitalize ${statusClass}">${esc(g.final_status || 'Unknown')}</span>
          </td>
          <td class="px-4 py-3 text-sm">${consoles}</td>
          <td class="px-4 py-3 text-sm">${ssds}</td>
          <td class="px-4 py-3 text-sm text-right">
            <button onclick="openManage('${escAttr(g.game_title)}')" 
              class="text-indigo-600 hover:text-indigo-800 dark:text-indigo-400 dark:hover:text-indigo-300 transition-colors text-xs font-medium">
              ⚙️ Manage
            </button>
          </td>
        </tr>`;
      }).join('');
    }

    // Open manage modal
    async function openManage(gameTitle) {
      currentGame = gameTitle;
      document.getElementById('modalGameTitle').textContent = gameTitle;
      document.getElementById('modalTitle').innerHTML = `Manage: <span class="text-indigo-600">${esc(gameTitle)}</span>`;

      // Also fetch full game data again
      try {
        const res = await fetch(`/api/dashboard/games?search=${encodeURIComponent(gameTitle)}&limit=1`, { credentials: 'include' });
        const json = await res.json();
        if (json.success && json.data.length) {
          const game = json.data[0];
          renderCurrentInstallations(game.consoles || [], game.ssds || []);
        }
      } catch (err) {
        console.error(err);
      }

      document.getElementById('manageModal').classList.remove('hidden');
    }

    function renderCurrentInstallations(consoles, ssds) {
      const consDiv = document.getElementById('currentConsoles');
      const ssdDiv = document.getElementById('currentSsds');

      if (consoles.length === 0) {
        consDiv.innerHTML = '<p class="text-gray-400 text-sm">Not installed on any console</p>';
      } else {
        consDiv.innerHTML = consoles.map(c =>
          `<span class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-sm font-medium badge-console">
            ${esc(c.console_id)}
            <button onclick="uninstall('${escAttr(c.console_id)}')" class="text-red-500 hover:text-red-700 ml-1" title="Remove">&times;</button>
          </span>`
        ).join('');
      }

      if (ssds.length === 0) {
        ssdDiv.innerHTML = '<p class="text-gray-400 text-sm">Not backed up on any SSD</p>';
      } else {
        ssdDiv.innerHTML = ssds.map(s =>
          `<span class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-sm font-medium badge-ssd">
            ${esc(s.console_id)}
            <button onclick="uninstall('${escAttr(s.console_id)}')" class="text-red-500 hover:text-red-700 ml-1" title="Remove">&times;</button>
          </span>`
        ).join('');
      }

      // Reset selects
      document.getElementById('consoleSelect').value = '';
      document.getElementById('ssdSelect').value = '';
    }

    // Install on console
    async function installOnConsole() {
      const consoleId = document.getElementById('consoleSelect').value;
      if (!consoleId) { alert('Please select a console'); return; }
      await doInstall(consoleId);
    }

    // Install on SSD
    async function installOnSsd() {
      const ssdId = document.getElementById('ssdSelect').value;
      if (!ssdId) { alert('Please select an SSD'); return; }
      await doInstall(ssdId);
    }

    async function doInstall(targetId) {
      try {
        const res = await fetch(`/api/dashboard/games/install`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ game_title: currentGame, console_id: targetId })
        });
        const json = await res.json();
        if (json.success) {
          await refreshList();
          openManage(currentGame);
        } else {
          alert(json.error || 'Install failed');
        }
      } catch (err) {
        alert(err.message);
      }
    }

    // Uninstall
    async function uninstall(consoleId) {
      if (!confirm(`Remove ${currentGame} from ${consoleId}?`)) return;
      try {
        const res = await fetch(`/api/dashboard/games/uninstall?game_title=${encodeURIComponent(currentGame)}&console_id=${encodeURIComponent(consoleId)}`, {
          method: 'DELETE',
          credentials: 'include'
        });
        const json = await res.json();
        if (json.success) {
          await refreshList();
          openManage(currentGame);
        } else {
          alert(json.error || 'Uninstall failed');
        }
      } catch (err) {
        alert(err.message);
      }
    }

    function closeModal() {
      document.getElementById('manageModal').classList.add('hidden');
      currentGame = null;
    }

    async function refreshList() {
      await fetchGames();
      await fetchTargets();
    }

    function showError(msg) {
      document.getElementById('gamesBody').innerHTML =
        `<tr><td colspan="6" class="px-4 py-8 text-center text-red-500">Error: ${esc(msg)}</td></tr>`;
    }

    // Debounced search
    function debounceRefresh() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(fetchGames, 300);
    }

    // Helpers
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    function escAttr(s) {
      return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Init
    document.getElementById('searchInput').addEventListener('input', debounceRefresh);
    document.getElementById('genreFilter').addEventListener('change', fetchGames);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    refreshList();
  </script>
</body>
</html>
